openapi: 3.1.0
info:
  title: Playtest Ingestion API
  version: "3.0"
  summary: Cross-tenant ingestion contract between xPlaytest and xCloud (Game Streaming Services).
  description: |
    Defines the two SAGE routes used by xPlaytest to onboard a published Playtest
    into xCloud's streaming pipeline and to poll the resulting workflow's terminal
    state.

    See SPEC.md §6 for prose context and SPEC.md §3.11 for the versioning strategy
    (additive-only on /v3, breaking changes go to /v4 with a deprecation window).

    Auth on both routes is cross-tenant S2S bearer; the calling SPN must be in
    SAGE's AuthorizedClientAppIds allow-list for the route (XC2).
  contact:
    name: Melanie Chen
  license:
    name: Microsoft Internal

servers:
  - url: https://{sageHost}
    description: |
      SAGE proxy. Routes documented here are the **external** SAGE paths that
      xPlaytest calls. SAGE matches them against its `appsettings.xcloud.json`
      `ApiRouteConfiguration` block (ServiceRouteName=`playtest`, Version=`v3`,
      Apis with PathTemplate `playtestingestion` / `playtestingestion/{jobId}`)
      and forwards them to `services.contentingestion` at
      `/v3/workflows/playtestingestion[/{jobId}]` (see ARCHITECTURE.md §3.2 / §3.3).
      Downstream consumers should treat the downstream paths as an implementation
      detail and program against the external paths in this document.
    variables:
      sageHost:
        default: sage.gamestreaming.xboxlive.com
        description: SAGE host per environment

tags:
  - name: PlaytestIngestion
    description: Trigger and poll the playtest ingestion workflow.

paths:
  /v3/playtest/playtestingestion:
    post:
      tags: [PlaytestIngestion]
      operationId: triggerPlaytestIngestion
      summary: Trigger asynchronous playtest ingestion into xCloud.
      description: |
        Schedules a `PlaytestIngestion` workflow in services.contentingestion.
        Returns immediately with an `OperationStatus` whose `id` is the workflow
        instance id; the caller polls via
        `GET /v3/playtest/playtestingestion/{jobId}`.

        **Idempotency (XC3 — receiver-side dedup not yet implemented):** The
        xCloud workflow upserts the offering keyed on the derived
        `xpt-{shortId(PlaytestId)}`. The intended contract is that re-submitting
        the same `PlaytestId` while a previous job is still running returns
        `409 Conflict` with a body that names the in-flight `jobId` + `statusUrl`
        so the caller can rejoin polling instead of starting a fresh job. After
        the previous job reaches a terminal state, re-submitting starts a new
        job that updates the existing offering in place. The contract-tier
        scheduler (`WorkflowProcessor.TryAcquireJobCreationLockAsync`) already
        emits `ServiceException(IngestionWorkflowAlreadyRunning, Conflict)` for
        races on the same lock id — XC3 will surface that exception as a
        `JobConflict` body, until then the dedup signal is best-effort and
        documented here for forward compatibility.
      security:
        - s2sBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaytestIngestionJobParameters"
            examples:
              minimal:
                summary: Minimal valid request (required fields only)
                value:
                  playtestId: "8a3b1f0c-4e6a-4f9b-9d3c-7b2e1a4d6f0e"
                  allowedDnaGroups:
                    - "4f9b9d3c-7b2e-1a4d-6f0e-8a3b1f0c4e6a"
                  expirationTime: "2026-08-01T00:00:00Z"
                  storeAsset:
                    storeEntry:
                      productId: "9NXYZ12345PT"
                      flags: "GAME"
                      name: "Example Game Playtest"
                      description: "Pre-release build for closed beta."
                      publisherId: "PUB12345"
                      isPrivateAudience: true
                      parentProductIds: []
                    markets: ["US"]
                    platform: "WINDOWS.DESKTOP"
                    contentId: "01234567-89ab-cdef-0123-456789abcdef"
                    xboxTitleId: 4294967040
                    packageFamilyName: "ExamplePub.ExampleGame_8wekyb3d8bbwe"
                    aumId: "ExamplePub.ExampleGame_8wekyb3d8bbwe!App"
              full:
                summary: Full request with all optional fields
                value:
                  playtestId: "8a3b1f0c-4e6a-4f9b-9d3c-7b2e1a4d6f0e"
                  allowedDnaGroups:
                    - "4f9b9d3c-7b2e-1a4d-6f0e-8a3b1f0c4e6a"
                    - "5a0c0e4d-8c3f-2b5e-7a1f-9b4c2d1d5f7b"
                  expirationTime: "2026-08-01T00:00:00Z"
                  allowedSandboxId: "RETAIL"
                  isGreenSigned: true
                  correlationId: "playtest-publish-2026-05-29-abc123"
                  storeAsset:
                    storeEntry:
                      productId: "9NXYZ12345PT"
                      flags: "GAME"
                      name: "Example Game Playtest"
                      description: "Pre-release build for closed beta."
                      publisherId: "PUB12345"
                      isPrivateAudience: true
                      parentProductIds: []
                    markets: ["US"]
                    platform: "WINDOWS.DESKTOP"
                    contentId: "01234567-89ab-cdef-0123-456789abcdef"
                    xboxTitleId: 4294967040
                    packageFamilyName: "ExamplePub.ExampleGame_8wekyb3d8bbwe"
                    aumId: "ExamplePub.ExampleGame_8wekyb3d8bbwe!App"
      responses:
        "202":
          description: |
            Accepted; workflow scheduled. The body is SAGE's standard
            `OperationStatus` envelope — `id` is the workflow instance id used
            for the subsequent polling URL.
          headers:
            Location:
              description: |
                Convenience URL for the polling endpoint
                (`/v3/playtest/playtestingestion/{id}`).
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "400":
          description: |
            Invalid request. Body validation failed — missing required field
            (`playtestId`, `allowedDnaGroups`, `expirationTime`, or `storeAsset`),
            `correlationId` over 128 characters, empty
            `allowedDnaGroups`, or `StoreAsset.Validate()` rejection.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "401":
          description: Unauthenticated.
        "403":
          description: |
            Forbidden — caller SPN is not in the AuthorizedClientAppIds allow-list
            for this route, or the cross-tenant auth scheme rejected the token.
        "409":
          description: |
            **Conflict — XC3 scope.** A non-terminal job already exists for this
            `playtestId`. HTTP 409 is the standard "the request can't be applied
            because it conflicts with the current state of the target resource"
            status; here the conflicting state is an in-flight workflow holding
            the per-playtest lock (`playtest_{playtestId}`). Response body names
            the in-flight `jobId` and `statusUrl` so the caller can rejoin polling
            on the existing job instead of starting a duplicate.

            **Not surfaced by the receiver in v1.** The workflow scheduler raises
            the conflict internally but the route does not yet translate it into
            this body shape — XC3 will. Documented here so xPlaytest can code
            the polling-rejoin path once.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/JobConflict" }
        "5XX":
          description: |
            Server error. Caller should treat as retryable and rely on the existing
            xPlaytest workflow retry policy (exponential backoff).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /v3/playtest/playtestingestion/{jobId}:
    parameters:
      - $ref: "#/components/parameters/JobId"
    get:
      tags: [PlaytestIngestion]
      operationId: getPlaytestIngestionStatus
      summary: Poll the playtest ingestion workflow's current state.
      description: |
        Used by xPlaytest with exponential backoff (30 s → 60 s → 2 min → 5 min cap,
        60 min foreground wall clock; see SPEC.md §3.1). After the foreground
        deadline xPlaytest persists the `jobId` and a background reconciliation
        job continues polling indefinitely (default 15 min interval, capped at
        24 h) until the workflow reaches a terminal state. The endpoint itself
        has no foreground timeout — the workflow may legitimately stay running
        for hours when asset ingestion is slow.
      security:
        - s2sBearer: []
      responses:
        "200":
          description: |
            Current workflow state, returned as SAGE's standard `OperationStatus`
            envelope. `isSuccess = null` while running; `true`/`false` once the
            workflow reaches a terminal state. The `description` field carries
            the human-readable summary (and, on success, the resulting
            `offeringId`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
              examples:
                running:
                  summary: Workflow still in progress.
                  value:
                    id: "8a3b1f0c-4e6a-4f9b-9d3c-7b2e1a4d6f0e"
                    startTime: "2026-05-29T21:10:00Z"
                    completionTime: null
                    description: "Asset ingestion in progress."
                    isSuccess: null
                succeeded:
                  summary: Terminal success — offering published.
                  value:
                    id: "8a3b1f0c-4e6a-4f9b-9d3c-7b2e1a4d6f0e"
                    startTime: "2026-05-29T21:10:00Z"
                    completionTime: "2026-05-29T21:18:42Z"
                    description: "Offering xpt-8a3b1f0c4e6a published."
                    isSuccess: true
                failed:
                  summary: Terminal failure.
                  value:
                    id: "8a3b1f0c-4e6a-4f9b-9d3c-7b2e1a4d6f0e"
                    startTime: "2026-05-29T21:10:00Z"
                    completionTime: "2026-05-29T21:25:00Z"
                    description: "AssetIngestionWorkflow returned Failed after 3 retries."
                    isSuccess: false
        "401":
          description: Unauthenticated.
        "403":
          description: Forbidden — caller SPN not in allow-list.
        "404":
          description: Unknown `jobId`.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /v3/playtest/playtestingestion/by-playtest/{playtestId}:
    parameters:
      - name: playtestId
        in: path
        required: true
        description: The xPlaytest-owned identifier (same value used in POST body).
        schema:
          type: string
          format: uuid
    delete:
      tags: [PlaytestIngestion]
      operationId: tombstonePlaytestIngestion
      summary: Tear down a published playtest's xCloud offering.
      description: |
        **Not implemented in v1 (XC1 scope only documents this route).** The
        receiver currently rejects all calls with `404`; the endpoint is kept in
        the contract so xPlaytest's PT6.d delete workflow can be written against
        the final shape and so the SAGE gateway route can be provisioned without
        a follow-up spec change. Implementation lands as part of the XC1.c /
        XC3.d task pair.

        When implemented, the call will cause the workflow to:
          * Set `offering.PlayerAuthorizationOptions.AllowedDnaGroups = []` —
            effectively denying everyone, preserving history.
          * Schedule a follow-up GC pass to fully delete the offering and
            its asset entries after a grace period (default 7 days).
        Idempotent: deleting an already-tombstoned offering returns 200.
      security:
        - s2sBearer: []
      responses:
        "200":
          description: Tombstone complete (or already tombstoned). XC3 scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "401":
          description: Unauthenticated.
        "403":
          description: Forbidden.
        "404":
          description: |
            No offering exists for this `playtestId` (never ingested), OR the
            endpoint is not yet implemented in v1 (current behaviour for every
            call until XC3.d ships).

components:
  securitySchemes:
    s2sBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cross-tenant S2S bearer issued for the xCloud audience. Caller SPN must
        be allow-listed on the SAGE route (`AuthorizedClientAppIds`).

  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      description: Workflow instance id returned by POST /v3/playtest/playtestingestion (the `id` field of `OperationStatus`).
      schema:
        type: string
        minLength: 1
        maxLength: 128

  schemas:
    PlaytestIngestionJobParameters:
      type: object
      description: |
        Sent by xPlaytest to xCloud through SAGE. Encodes the Playtest identity,
        allowed testers, expiry/sandbox, and a fully-formed StoreAsset.

        **Conditional validation:** When `storeAsset.storeEntry.flags = GAME`
        and `storeAsset.platform = WINDOWS.DESKTOP` (v1 default for Playtest),
        the StoreAsset validator additionally requires `xboxTitleId`,
        `packageFamilyName`, and `aumId`. The base schema marks these as
        nullable to keep the contract reusable for v1.1+ platforms; the
        `if/then` block below makes the v1 PC-game subset explicit.
      required:
        - playtestId
        - allowedDnaGroups
        - expirationTime
        - storeAsset
      if:
        properties:
          storeAsset:
            properties:
              platform: { const: "WINDOWS.DESKTOP" }
              storeEntry:
                properties:
                  flags: { const: "GAME" }
      then:
        properties:
          storeAsset:
            required: [storeEntry, markets, platform, contentId, xboxTitleId, packageFamilyName, aumId]
      properties:
        playtestId:
          type: string
          format: uuid
          description: |
            The stable Playtest identifier (recommended: `PartnerCenterProductId`
            per SPEC.md §9 Q1). xCloud derives the offering id as
            `xpt-{shortId(playtestId)}`. The chosen id MUST be stable across
            republishes — otherwise every nightly build creates a new offering.
        allowedDnaGroups:
          type: array
          minItems: 1
          uniqueItems: true
          description: |
            DNA group GUIDs (resolved by GMS) authorized to access the offering.
            xCloud wraps each as `XusAudience(g, RetailSandboxId)`. The install
            pipeline uses the lexicographically smallest GUID as the deterministic
            flight identifier (SPEC.md §3.3).
          items:
            type: string
            format: uuid
        expirationTime:
          type: string
          format: date-time
          description: |
            When the offering should expire. **Required** — the
            `POST /v3/playtest/playtestingestion` endpoint exists only for streaming-enabled
            playtests, and the June 3 2026 sync ratified that every streaming
            playtest must carry an explicit end date. The xPlaytest publish-side
            validator rejects streaming publishes without it (`400 BadRequest`)
            before this endpoint is ever called; xCloud also rejects requests
            missing the field as defense in depth. No hard cap in v1; xCloud
            may apply a soft cap of 180 days for capacity reclaim in a future
            release. The Partner Center UI pre-fills a 90-day default — see
            SPEC.md §9 Q3.
        allowedSandboxId:
          type: string
          default: "RETAIL"
          description: Sandbox the offering is gated to. RETAIL for all Playtests today.
        isGreenSigned:
          type: boolean
          default: true
          description: |
            Whether the build is Green-signed (true for all Playtests today).
            Reserved as optional so the contract does not break when alternative
            signing schemes are introduced.
        callbackUrl:
          type: string
          format: uri
          nullable: true
          description: |
            **Reserved for v1.1.** When cross-tenant messaging exists, xCloud
            will POST terminal-state notifications here. Ignored in v1 — caller
            must poll the GET endpoint.
        correlationId:
          type: string
          maxLength: 128
          nullable: true
          description: |
            Optional caller-supplied trace id. xCloud echoes it back in the
            status response for log correlation.
        storeAsset:
          $ref: "#/components/schemas/StoreAsset"

    StoreAsset:
      type: object
      description: |
        Existing xCloud contract (`StoreAsset.cs:17`). xPlaytest must produce
        values that pass `StoreAsset.Validate()` (`StoreAsset.cs:25-61`).
      required:
        - storeEntry
        - markets
        - platform
        - contentId
      properties:
        storeEntry:
          $ref: "#/components/schemas/StoreEntry"
        markets:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            description: ISO 3166-1 alpha-2 country code (wrapped in `Id` server-side).
            example: "US"
        platform:
          type: string
          enum: ["WINDOWS.DESKTOP", "XBOX.SCARLETT", "XBOX.ANACONDA", "XBOX.LOCKHART"]
          description: |
            v1 supports `WINDOWS.DESKTOP` only (SPEC.md §3.6). Xbox values
            reserved for v1.1+.
        contentId:
          type: string
          format: uuid
          description: |
            Asset content id. Must equal the `SourceId` derived inside the
            workflow (`AssetIngestion.JobParameters.Validate()` enforces this).
        xboxTitleId:
          type: integer
          format: int64
          minimum: 1
          maximum: 4294967295
          nullable: true
          description: |
            Xbox Live Title ID (uint). REQUIRED for games — validator rejects
            null/0. Today `PlaytestProductDocumentBuilder.cs:53-70` hardcodes
            empty; new XProduct resolver lands as part of PT2.
        packageFamilyName:
          type: string
          nullable: true
          description: Required for PC builds.
          example: "ExamplePub.ExampleGame_8wekyb3d8bbwe"
        aumId:
          type: string
          nullable: true
          description: |
            `{PackageFamilyName}!{ApplicationId}`. Required for PC builds by the
            validator. In v1 a constant default is acceptable (Timi confirmed
            telemetry-only server-side); v1.1 sources the real ApplicationId
            from the AppX manifest.
          example: "ExamplePub.ExampleGame_8wekyb3d8bbwe!App"

    StoreEntry:
      type: object
      required:
        - productId
        - flags
        - name
        - publisherId
        - isPrivateAudience
      properties:
        productId:
          type: string
          description: |
            `PlaytestPublishJobParameters.PlaytestGeneratedXProductBigId`.
            NOT the retail Partner Center product id.
        flags:
          type: string
          enum: ["GAME", "APP", "ADDON"]
          description: Always `GAME` for Playtest.
        name:
          type: string
          description: From `PlaytestResponse.Name`.
        description:
          type: string
          nullable: true
          description: From `PlaytestResponse.Description`.
        publisherId:
          type: string
          description: From `PublishedPlaytestEntity.SellerId`.
        isPrivateAudience:
          type: boolean
          description: Always `true` for Playtest.
        parentProductIds:
          type: array
          default: []
          items: { type: string }
          description: Empty for Playtest (no hub-game relationships).

    OperationStatus:
      type: object
      description: |
        SAGE's standard async-operation envelope (see
        `Microsoft.GameStreaming.Services.Common.Content.Operations.OperationStatus`
        in services.contentingestion). The same shape is used for the asset and
        asset-version ingestion endpoints (`/v3/workflows/assetingestion`,
        `/v3/workflows/assetversioningestion`); the Playtest endpoint reuses it
        so xPlaytest can share a single typed client across SAGE workflows.

        The receiver derives the values from `PlaytestIngestion.JobStateV3`
        (which implements `IOperationState`): `description` carries the
        human-readable summary, and once the workflow succeeds it embeds the
        resulting `offeringId`.
      required: [id, startTime, description]
      properties:
        id:
          type: string
          description: |
            Workflow instance id assigned by the scheduler when the job was
            accepted. Stable for the lifetime of the job; used as the path
            segment of the polling URL.
          minLength: 1
        startTime:
          type: string
          format: date-time
          description: UTC timestamp at which the workflow began.
        completionTime:
          type: string
          format: date-time
          nullable: true
          description: |
            UTC timestamp at which the workflow reached a terminal state.
            `null` while the job is still running.
        description:
          type: string
          description: |
            Human-readable summary of current state. On success this includes
            the resulting `offeringId`; on failure it includes the underlying
            error message.
        isSuccess:
          type: boolean
          nullable: true
          description: |
            Tri-state success indicator:
              * `null` — the job has not yet reached a terminal state.
              * `true` — the job completed successfully.
              * `false` — the job completed with failure; consult `description`.

    ProblemDetails:
      type: object
      description: |
        RFC 7807 ProblemDetails. NB: SAGE today strips bodies in favor of an
        `x-Proxy-Error` header (`ProxyController.cs:255-270`); for the two
        Playtest routes, SAGE must forward the response body unchanged
        (tracked in XC1).
      required: [title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              field: { type: string }
              message: { type: string }

    JobConflict:
      description: |
        Returned with HTTP 409 when a non-terminal Playtest ingestion job
        already exists for the requested `playtestId`. xPlaytest should rejoin
        polling on the in-flight `jobId` rather than starting a duplicate; the
        deduplication is keyed on the workflow lock id
        `playtest_{playtestId}`. **XC3 scope** — the receiver does not surface
        this body in v1.
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
        - type: object
          required: [jobId, statusUrl]
          properties:
            jobId:
              type: string
              description: |
                The in-flight job that already exists for this `playtestId`.
                Callers should POLL this job instead of starting a new one.
            statusUrl:
              type: string
              format: uri
              description: Fully-qualified URL to GET the existing job's status.
